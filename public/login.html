<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0" />

<title>
BDPH Login
</title>

<link rel="stylesheet"
href="/styles.css" />

</head>

<body>

<main class="auth-page">

<section class="auth-card">

<div class="auth-brand">
BDPH Tracking Fleet Access
</div>

<h1>
Sign in to BDPH Tracking World
</h1>

<p>
Use your username and password.
</p>

<form id="loginForm"
class="form-stack">

<input
id="username"
class="field"
type="text"
placeholder="Username"
required
/>

<input
id="password"
class="field"
type="password"
placeholder="Password"
required
/>

<button
class="btn btn-primary"
type="submit">

Login

</button>

<!-- LOGIN LINKS -->

<div class="loginLinks">

<a href="#">
Forgot Password?
</a>

<a href="#"
id="changePasswordBtn">

Change Password

</a>

</div>

<!-- MESSAGE -->

<div class="message"
id="loginMessage">
</div>

<p>
Powered by @BDPH Group.
</p>

</form>

</section>

</main>

<!-- =====================================
PASSWORD MODAL
===================================== -->

<div id="passwordModal">

<div class="passwordCard">

<h2>
Change Password
</h2>

<input
type="password"
id="oldPassword"
placeholder="Current Password">

<input
type="password"
id="newPassword"
placeholder="New Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<div class="passwordButtons">

<button id="savePasswordBtn">
SAVE
</button>

<button id="closePasswordBtn">
CANCEL
</button>

</div>

</div>

</div>

<script src="/common.js"></script>

<script src="/login.js"></script>

</body>

</html>
