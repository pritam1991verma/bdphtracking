<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BDPH Fuel</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <div id="topbarMount"></div>

      <section class="page-hero compact-hero">
        <div>
          <span class="hero-kicker">Fuel</span>
          <h2>Fuel monitoring with clear priorities and refill visibility.</h2>
          <p class="small">Track low-fuel vehicles and monitor fleet fuel readiness.</p>
        </div>
      </section>

      <section class="section-grid two-col">
        <article class="panel section-card">
          <h3>Fuel Metrics</h3>
          <div class="metric-stack" id="fuelMetrics"></div>
        </article>
        <article class="panel section-card">
          <h3>Fuel Priority List</h3>
          <div class="table-stack" id="fuelList"></div>
        </article>
      </section>
    </div>

    <script src="/common.js"></script>
    <script src="/fuel.js"></script>
  </body>
</html>
