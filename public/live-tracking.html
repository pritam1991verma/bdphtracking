<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<script src="/auth.js"></script>

<title>
AI Live Tracking
</title>

<link rel="stylesheet"
href="/styles.css">

</head>

<body>

<div class="ai-background"></div>

<div class="shell">

<div id="topbarMount"></div>

<!-- HERO -->

<section class="ai-hero">

<div class="hero-left">

<div class="live-badge">

<span class="pulse"></span>

LIVE GPS AI

</div>

<h1>
AI Fleet Tracking
</h1>

<p>
Real-time AI operational movement
simulation with smart risk tracking.
</p>

</div>

<div class="hero-right">

<div class="ai-orb">

<div class="inner-orb"></div>

</div>

</div>

</section>

<!-- MAP -->

<section class="glass-panel">

<div class="panel-head">

<h3>
Live Vehicle Grid
</h3>

<span>
TRACKING
</span>

</div>

<div class="tracking-map"
id="trackingMap">

<!-- VEHICLES -->

</div>

</section>

<!-- LIVE STATUS -->

<section class="dual-grid">

<div class="glass-panel">

<div class="panel-head">

<h3>
Vehicle Status
</h3>

<span>
LIVE
</span>

</div>

<div id="vehicleStatus"
class="alert-stack">

</div>

</div>

<div class="glass-panel">

<div class="panel-head">

<h3>
AI Radar
</h3>

<span>
ACTIVE
</span>

</div>

<div class="radar-box">

<div class="radar-circle"></div>

<div class="radar-circle delay1"></div>

<div class="radar-circle delay2"></div>

<div class="radar-dot"></div>

</div>

</div>

</section>

</div>

<script src="/common.js"></script>

<script src="/live-tracking.js"></script>

<script src="/ai-assistant.js"></script>

</body>

</html>
