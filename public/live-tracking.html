<!DOCTYPE html>
<html>

<head>

<title>
Live Tracking
</title>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

body{
margin:0;
background:#07111f;
font-family:Arial;
color:white;
}

header{
padding:25px;
font-size:34px;
font-weight:bold;
background:#081b2d;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<header>
🚛 BDPH AI LIVE TRACKING
</header>

<div id="map"></div>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

const map = L.map('map').setView(
[23.8103,86.4126],
6
);

<script>

const map = L.map('map').setView(
[23.8103,86.4126],
6
);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'BDPH AI',
maxZoom:19
}
).addTo(map);

/* VEHICLES */

const vehicles = [

{
name:"JH16G1234",
lat:23.8,
lng:86.4,
risk:true
},

{
name:"BR01AB1234",
lat:24.2,
lng:85.9,
risk:false
},

{
name:"WB22XZ8899",
lat:22.9,
lng:87.1,
risk:false
}

];

vehicles.forEach(vehicle=>{
const markerHtml = `

<div style="
position:relative;
width:22px;
height:22px;
">

<div style="
position:absolute;
inset:0;

border-radius:50%;

background:
${vehicle.risk
? '#ff1744'
: '#00ff88'};

box-shadow:
0 0 20px
${vehicle.risk
? '#ff1744'
: '#00ff88'};

animation:pulse 1.5s infinite;
"></div>

<div style="
position:absolute;
inset:-10px;

border-radius:50%;

border:2px solid
${vehicle.risk
? '#ff1744'
: '#00ff88'};

opacity:0.4;

animation:ring 2s infinite;
"></div>

</div>

`;

const icon = L.divIcon({

html: markerHtml,

className:"",

iconSize:[22,22]

});


});

L.marker(
[
vehicle.lat,
vehicle.lng
],
{
icon
}
)

.addTo(map)

.bindPopup(`

<h3>
${vehicle.name}
</h3>

<p>
AI Tracking Active
</p>

`);

});

</script>

</body>

</html>
