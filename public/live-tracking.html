<!DOCTYPE html>
<html>

<head>

<title>
Live Tracking
</title>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

body{
margin:0;
background:#07111f;
font-family:Arial;
color:white;
}

header{
padding:25px;
font-size:34px;
font-weight:bold;
background:#081b2d;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<header>
🚛 BDPH AI LIVE TRACKING
</header>

<div id="map"></div>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>
<script>
const map = L.map('map').setView(
[23.8103,86.4126],
6
);

<script>

<script>

<script>

const map = L.map('map').setView(
[23.8103,86.4126],
6
);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'BDPH'
}
).addTo(map);

const vehicles = [

{
name:"JH16G1234",
lat:23.8,
lng:86.4
},

{
name:"BR01AB1234",
lat:24.2,
lng:85.9
}

];

vehicles.forEach(vehicle=>{

L.marker([
vehicle.lat,
vehicle.lng
])

.addTo(map)

.bindPopup(vehicle.name);

});

</script>

<h3>
${vehicle.name}
</h3>

<p>
AI Tracking Active
</p>

`);

});

</script>

</body>

</html>
