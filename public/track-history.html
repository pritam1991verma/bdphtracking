<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BDPH Premium Playback</title>

<!-- LEAFLET CSS -->

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- YOUR CSS -->

<link rel="stylesheet"
href="track-history.css">

</head>

<body>

<!-- =====================================
HEADER
===================================== -->

<div class="header">

<div class="leftHeader">

<h1>
BDPH Track Playback
</h1>

</div>

<div class="controls">

<!-- VEHICLE -->

<select id="vehicleSelect">

<option>
JH05AB1234
</option>

<option>
JH05CD5678
</option>

<option>
JH05EF9012
</option>

</select>

<!-- START DATE -->

<input type="date" id="startDate">

<input type="time" id="startTime">

<!-- END DATE -->

<input type="date" id="endDate">

<input type="time" id="endTime">

<!-- LOAD -->

<button id="loadTripBtn">
LOAD
</button>

<!-- PLAYBACK -->

<button id="rewindBtn">
⏮
</button>

<button id="playBtn">
▶
</button>

<button id="pauseBtn">
⏸
</button>

<!-- SPEED -->

<select id="speedSelect">

<option value="1">
1X
</option>

<option value="2">
2X
</option>

<option value="5">
5X
</option>

<option value="10">
10X
</option>

</select>

</div>

</div>

<!-- =====================================
MAIN LAYOUT
===================================== -->

<div class="mainContainer">

<!-- =====================================
SIDEBAR
===================================== -->

<div class="sidebar">

<!-- TRIP SUMMARY -->

<div class="card">

<h2>
Trip Summary
</h2>

<div class="statRow">
<span>Total Distance</span>
<b>377 KM</b>
</div>

<div class="statRow">
<span>Running Time</span>
<b>9.5 H</b>
</div>

<div class="statRow">
<span>Idle Time</span>
<b>1.2 H</b>
</div>

<div class="statRow">
<span>Average Speed</span>
<b id="speedText">
42 KM/H
</b>
</div>

<div class="statRow">
<span>Top Speed</span>
<b>
85 KM/H
</b>
</div>

</div>

<!-- INCIDENTS -->

<div class="card">

<h2>
Incident Summary
</h2>

<div class="statRow">
<span>Overspeeding</span>
<b id="overspeedCount">
3
</b>
</div>

<div class="statRow">
<span>Harsh Braking</span>
<b id="harshCount">
2
</b>
</div>

<div class="statRow">
<span>Vehicle Halt</span>
<b id="haltCount">
4
</b>
</div>

<div class="statRow">
<span>Trip Distance</span>
<b>
377 KM
</b>
</div>

</div>

<!-- DRIVER SCORE -->

<div class="card scoreCard">

<h2>
Driver Score
</h2>

<div class="scoreCircle">
92
</div>

</div>

</div>

<!-- =====================================
MAP AREA
===================================== -->

<div class="mapContainer">

<!-- MAP -->

<div id="map"></div>

<!-- SPEEDOMETER -->

<div class="speedometer">

<span id="speedMeter">
42
</span>

<span>
KM/H
</span>

</div>

<!-- =====================================
PLAYBACK PANEL
===================================== -->

<div class="playbackPanel">

<!-- TIMELINE -->

<input type="range"
id="timelineSlider"
min="0"
max="100"
value="0">

<!-- GRAPH -->

<div id="eventGraph">

<div class="graphLine"></div>

<!-- OVERSPEED -->

<div class="eventSpike red"
style="left:55%">
</div>

<!-- HARSH BRAKE -->

<div class="eventSpike orange"
style="left:72%">
</div>

<!-- HALT -->

<div class="eventSpike yellow"
style="left:88%">
</div>

<!-- PLAYHEAD -->

<div id="playhead"></div>

</div>

<!-- TIMELINE INFO -->

<div class="timelineInfo">

<span>
Trip Start
</span>

<span id="currentTime">
08:00:00
</span>

<span>
Trip End
</span>

</div>

</div>

</div>

</div>
<!-- =====================================
ACTION MESSAGE
===================================== -->

  <div id="actionMessage"></div>
<!-- =====================================
LEAFLET JS
===================================== -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- YOUR JS -->

<script src="track-history.js"></script>

</body>
</html>
