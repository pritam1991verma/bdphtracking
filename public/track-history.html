<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BDPH Premium Playback</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#08111f;
color:white;
overflow:hidden;
}

.header{
height:80px;
background:#0d1b2a;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid #1d3557;
}

.controls{
display:flex;
gap:10px;
}

.controls select,
.controls input,
.controls button{
padding:12px;
border:none;
border-radius:10px;
}

.controls button{
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

.main{
display:flex;
height:calc(100vh - 80px);
}

.sidebar{
width:320px;
background:#0b1727;
padding:15px;
overflow:auto;
}

.card{
background:#10233b;
padding:18px;
border-radius:18px;
margin-bottom:15px;
}

.stat{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.mapArea{
flex:1;
position:relative;
}

#map{
height:100%;
width:100%;
}

.playbackPanel{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:70%;
background:rgba(13,27,42,0.95);
padding:20px;
border-radius:20px;
z-index:9999;
}

.playControls{
display:flex;
gap:10px;
margin-bottom:15px;
}

.playControls button{
padding:12px 18px;
background:#00c853;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#timeline{
width:100%;
}

.vehicleCard{
position:absolute;
top:20px;
right:20px;
background:white;
color:black;
padding:20px;
border-radius:18px;
width:240px;
z-index:9999;
}

</style>

</head>

<body>

<div class="header">

<h1>Track History Playback</h1>

<div class="controls">

<select>
<option>JH05AB1234</option>
<option>JH05CD5678</option>
</select>

<input type="date">
<input type="time">

<input type="date">
<input type="time">

<button>Load</button>

</div>

</div>

<div class="main">

<div class="sidebar">

<div class="card">

<h2>Trip Summary</h2>

<div class="stat">
<span>Distance</span>
<b>377 km</b>
</div>

<div class="stat">
<span>Running Time</span>
<b>9.5 h</b>
</div>

<div class="stat">
<span>Idle Time</span>
<b>1.2 h</b>
</div>

<div class="stat">
<span>Top Speed</span>
<b>85 km/h</b>
</div>

<div class="stat">
<span>Fuel Used</span>
<b>75 L</b>
</div>

</div>

</div>

<div class="mapArea">

<div id="map"></div>

<div class="vehicleCard">

<h2>JH05AB1234</h2>

<p>Moving</p>

<p>43 km/h</p>

<p>Fuel : 72%</p>

</div>

<div class="playbackPanel">

<div class="playControls">

<button id="rewindBtn">⏮</button>

<button id="playBtn">▶</button>

<button id="pauseBtn">⏸</button>

<select id="speedSelect">

<option value="1">1x</option>
<option value="2">2x</option>
<option value="5">5x</option>
<option value="10">10x</option>

</select>

</div>

<input type="range"
id="timeline"
min="0"
max="100"
value="0">

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([22.8046,86.2029],12);

/* NORMAL */

const normal = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

/* SATELLITE */

const satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
attribution:'© Esri'
}
);

/* TERRAIN */

const terrain = L.tileLayer(
'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenTopoMap'
}
);

/* LAYERS */

L.control.layers({
"Normal":normal,
"Satellite":satellite,
"Terrain":terrain
}).addTo(map);

/* ROUTE */

const route = [

[22.8046,86.2029],
[22.8060,86.2040],
[22.8080,86.2060],
[22.8100,86.2080],
[22.8120,86.2100],
[22.8140,86.2130],
[22.8170,86.2200]

];

L.polyline(route,{
color:'lime',
weight:6
}).addTo(map);

/* ICON */

const truckIcon = L.icon({

iconUrl:
'https://cdn-icons-png.flaticon.com/512/744/744465.png',

iconSize:[50,50],

iconAnchor:[25,25]

});

/* TRUCK */

const truck = L.marker(route[0],{
icon:truckIcon
}).addTo(map);

/* PLAYBACK */

let currentSegment = 0;
let animationProgress = 0;

let running = false;

let playbackSpeed = 1;

let animationFrame;

function interpolate(start, end, t){

return [
start[0] + (end[0]-start[0]) * t,
start[1] + (end[1]-start[1]) * t
];

}

function animateTruck(){

if(!running) return;

const start = route[currentSegment];
const end = route[currentSegment + 1];

if(!end){

running = false;

cancelAnimationFrame(animationFrame);

return;

}

animationProgress += 0.003 * playbackSpeed;

if(animationProgress >= 1){

animationProgress = 0;

currentSegment++;

}

const pos = interpolate(
start,
end,
animationProgress
);

truck.setLatLng(pos);

/* MAP FOLLOW */

map.panTo(pos,{
animate:true,
duration:0.5
});

/* TIMELINE */

const timelinePercent =
((currentSegment + animationProgress)
/
(route.length - 1)) * 100;

document.getElementById("timeline").value =
timelinePercent;

/* RANDOM SPEED */

const speedValue =
Math.floor(30 + Math.random()*40);

document.querySelector(
".vehicleCard p:nth-child(3)"
).innerHTML =
speedValue + " km/h";

animationFrame =
requestAnimationFrame(animateTruck);

}

/* PLAY */

document.getElementById("playBtn")
.addEventListener("click",()=>{

if(running) return;

running = true;

animateTruck();

});

/* PAUSE */

document.getElementById("pauseBtn")
.addEventListener("click",()=>{

running = false;

cancelAnimationFrame(animationFrame);

});

/* REWIND */

document.getElementById("rewindBtn")
.addEventListener("click",()=>{

running = false;

cancelAnimationFrame(animationFrame);

currentSegment = 0;

animationProgress = 0;

truck.setLatLng(route[0]);

document.getElementById("timeline").value = 0;

});

/* SPEED */

document.getElementById("speedSelect")
.addEventListener("change",(e)=>{

playbackSpeed = Number(e.target.value);

});

</script>

</body>
</html>
