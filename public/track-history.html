<script>

const map = L.map('map').setView([22.8046,86.2029],12);

/* =========================
   NORMAL MAP
========================= */

const normal = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

/* =========================
   SATELLITE VIEW
========================= */

const satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
maxZoom:19,
attribution:'© Esri'
}
);

/* =========================
   TERRAIN VIEW
========================= */

const terrain = L.tileLayer(
'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
{
maxZoom:17,
attribution:'© OpenTopoMap'
}
);

/* =========================
   MAP SWITCHER
========================= */

const baseMaps = {
"Normal": normal,
"Satellite": satellite,
"Terrain": terrain
};

L.control.layers(baseMaps).addTo(map);

/* =========================
   GPS DATA
========================= */

const gpsData = [

{lat:22.8046,lng:86.2029,speed:20,time:"08:00:00"},
{lat:22.8060,lng:86.2040,speed:35,time:"08:05:00"},
{lat:22.8080,lng:86.2060,speed:48,time:"08:10:00"},
{lat:22.8100,lng:86.2080,speed:62,time:"08:15:00"},
{lat:22.8120,lng:86.2100,speed:85,time:"08:20:00"},
{lat:22.8140,lng:86.2130,speed:0,time:"08:30:00"},
{lat:22.8140,lng:86.2130,speed:0,time:"08:45:00"},
{lat:22.8170,lng:86.2200,speed:38,time:"08:50:00"}

];

/* =========================
   ROUTE COLOR
========================= */

function getColor(speed){

if(speed <= 40) return "#00e676";
if(speed <= 60) return "#ffee58";
if(speed <= 80) return "#ff9100";

return "#ff1744";

}

/* =========================
   DRAW ROUTE
========================= */

for(let i=0;i<gpsData.length-1;i++){

const current = gpsData[i];
const next = gpsData[i+1];

L.polyline([
[current.lat,current.lng],
[next.lat,next.lng]
],{
color:getColor(current.speed),
weight:7,
opacity:0.9
}).addTo(map);

}

/* =========================
   ICONS
========================= */

const truckIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/744/744465.png',
iconSize:[55,55],
iconAnchor:[27,27]
});

const stopIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/1828/1828843.png',
iconSize:[35,35]
});

const overspeedIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/565/565340.png',
iconSize:[35,35]
});

const harshIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/3524/3524659.png',
iconSize:[35,35]
});

/* =========================
   EVENT MARKERS
========================= */

L.marker([
gpsData[4].lat,
gpsData[4].lng
],{
icon:overspeedIcon
}).addTo(map)
.bindPopup(`
<b>Overspeed Event</b><br>
Speed : 85 km/h<br>
Time : 08:20:00
`);

L.marker([
gpsData[5].lat,
gpsData[5].lng
],{
icon:stopIcon
}).addTo(map)
.bindPopup(`
<b>Vehicle Halted</b><br>
Duration : 15 Minutes
`);

L.marker([
gpsData[6].lat,
gpsData[6].lng
],{
icon:harshIcon
}).addTo(map)
.bindPopup(`
<b>Harsh Braking</b>
`);

/* =========================
   VEHICLE
========================= */

const truck = L.marker([
gpsData[0].lat,
gpsData[0].lng
],{
icon:truckIcon
}).addTo(map);

truck.bindPopup(`
<div style="font-family:Arial">

<h3 style="margin:0">
JH05AB1234
</h3>

<b style="color:green">
MOVING
</b>

<br><br>

Speed : 20 km/h<br>
Fuel : 72%<br>
Driver : Ramesh<br>
Ignition : ON<br>
GSM : Strong

</div>
`);

/* =========================
   PLAYBACK
========================= */

let current = 0;
let interval;
let running = false;
let speed = 1000;

function moveTruck(){

if(current >= gpsData.length){

clearInterval(interval);

running = false;

return;

}

const point = gpsData[current];

truck.setLatLng([
point.lat,
point.lng
]);

truck.setPopupContent(`

<div style="font-family:Arial">

<h3 style="margin:0">
JH05AB1234
</h3>

<b style="color:${point.speed > 0 ? '#00c853' : '#ff1744'}">

${point.speed > 0 ? 'MOVING' : 'STOPPED'}

</b>

<br><br>

Speed : ${point.speed} km/h<br>
Time : ${point.time}<br>
Fuel : 72%<br>
Ignition : ON

</div>

`);

map.panTo([
point.lat,
point.lng
]);

document.getElementById("timeline").value =
(current/(gpsData.length-1))*100;

document.getElementById("timeText").innerText =
point.time;

current++;

}

/* =========================
   PLAY
========================= */

document.getElementById("playBtn")
.addEventListener("click",()=>{

if(running) return;

running = true;

interval = setInterval(
moveTruck,
speed
);

});

/* =========================
   PAUSE
========================= */

document.getElementById("pauseBtn")
.addEventListener("click",()=>{

clearInterval(interval);

running = false;

});

/* =========================
   REWIND
========================= */

document.getElementById("rewindBtn")
.addEventListener("click",()=>{

current = 0;

truck.setLatLng([
gpsData[0].lat,
gpsData[0].lng
]);

});

/* =========================
   SPEED
========================= */

document.getElementById("speedSelect")
.addEventListener("change",(e)=>{

speed = 1000 / Number(e.target.value);

if(running){

clearInterval(interval);

interval = setInterval(
moveTruck,
speed
);

}

});

/* =========================
   TIMELINE SCRUB
========================= */

document.getElementById("timeline")
.addEventListener("input",(e)=>{

const index = Math.floor(
(e.target.value/100)*(gpsData.length-1)
);

current = index;

const point = gpsData[index];

truck.setLatLng([
point.lat,
point.lng
]);

map.panTo([
point.lat,
point.lng
]);

document.getElementById("timeText").innerText =
point.time;

});

</script>
