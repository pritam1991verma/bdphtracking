<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BDPH Premium Track History</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="track-history.css">

</head>

<body>

<div class="header">

    <div class="leftHeader">
        <h1>Track History Playback</h1>
    </div>

    <div class="controls">

        <select id="vehicleSelect">
            <option>JH05AB1234</option>
            <option>JH04X0920</option>
        </select>

        <input type="date">
        <input type="time">

        <input type="date">
        <input type="time">

        <button id="loadHistoryBtn">Load</button>

    </div>

</div>

<div class="mainContainer">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="card">

            <h2>Trip Summary</h2>

            <div class="statRow">
                <span>Distance</span>
                <b>377 km</b>
            </div>

            <div class="statRow">
                <span>Running Time</span>
                <b>9.5 h</b>
            </div>

            <div class="statRow">
                <span>Idle Time</span>
                <b>1.2 h</b>
            </div>

            <div class="statRow">
                <span>Max Speed</span>
                <b>42 km/h</b>
            </div>

            <div class="statRow">
                <span>Fuel</span>
                <b>75 L</b>
            </div>

        </div>

        <div class="card">

            <h2>Driver Behaviour</h2>

            <div class="alertItem red">
                Overspeed Events : 4
            </div>

            <div class="alertItem orange">
                Harsh Braking : 2
            </div>

            <div class="alertItem purple">
                Idle Events : 3
            </div>

            <div class="alertItem cyan">
                Route Deviation : 1
            </div>

        </div>

        <div class="card scoreCard">

            <h2>Driver Score</h2>

            <div class="scoreCircle">
                82
            </div>

        </div>

    </div>

    <!-- MAP AREA -->
    <div class="mapContainer">

        <div id="map"></div>

        <!-- PLAYBACK PANEL -->
        <div class="playbackPanel">

            <div class="playbackControls">

                <button id="rewindBtn">⏪</button>
                <button id="playBtn">▶</button>
                <button id="pauseBtn">⏸</button>

                <select id="speedSelect">
                    <option value="1">1x</option>
                    <option value="2">2x</option>
                    <option value="5">5x</option>
                    <option value="10">10x</option>
                </select>

            </div>

            <input type="range" id="timelineSlider" min="0" max="100" value="0">

            <div class="timelineInfo">

                <span id="currentTime">08:00:00</span>

                <span id="playbackStatus">
                    Playback Ready
                </span>

            </div>

        </div>

    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="track-history.js"></script>

</body>
</html>
