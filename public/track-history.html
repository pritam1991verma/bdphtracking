<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<script>

/* =========================================
   MAP INITIALIZATION
========================================= */

const map = L.map('map',{
zoomControl:false
}).setView([22.8046,86.2029],13);

/* =========================================
   MAP MODES
========================================= */

/* NORMAL */

const normal = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

/* TERRAIN */

const terrain = L.tileLayer(
'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenTopoMap'
}
);

/* SATELLITE */

const satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
attribution:'© Esri'
}
);

/* DARK */

const dark = L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
{
attribution:'© CARTO'
}
);

/* LAYER CONTROL */

L.control.layers({
"Normal":normal,
"Terrain":terrain,
"Satellite":satellite,
"Dark":dark
}).addTo(map);

/* =========================================
   ROUTE DATA
========================================= */

const route = [

{
latlng:[22.8046,86.2029],
speed:20,
time:"08:00"
},

{
latlng:[22.8056,86.2040],
speed:35,
time:"08:05"
},

{
latlng:[22.8072,86.2058],
speed:48,
time:"08:10"
},

{
latlng:[22.8090,86.2080],
speed:62,
time:"08:15"
},

{
latlng:[22.8108,86.2100],
speed:85,
time:"08:20",
event:"Overspeed"
},

{
latlng:[22.8125,86.2135],
speed:0,
time:"08:30",
event:"Vehicle Stop"
},

{
latlng:[22.8140,86.2170],
speed:20,
time:"08:40",
event:"Harsh Brake"
},

{
latlng:[22.8170,86.2200],
speed:38,
time:"08:50"
}

];

/* =========================================
   ROUTE COLOR LOGIC
========================================= */

function getRouteColor(speed){

if(speed <= 40) return "lime";

if(speed <= 60) return "yellow";

if(speed <= 80) return "orange";

return "red";

}

/* =========================================
   GLOW ROUTE
========================================= */

L.polyline(
route.map(p=>p.latlng),
{
color:'#00ff88',
weight:16,
opacity:0.15
}
).addTo(map);

/* =========================================
   ROUTE DRAWING
========================================= */

for(let i=0;i<route.length-1;i++){

L.polyline([
route[i].latlng,
route[i+1].latlng
],{
color:getRouteColor(route[i].speed),
weight:6
}).addTo(map);

}

/* =========================================
   ROUTE POINTS
========================================= */

route.forEach((point)=>{

L.circleMarker(point.latlng,{
radius:4,
color:'#00ff88',
fillColor:'#00ff88',
fillOpacity:1
}).addTo(map);

});

/* =========================================
   EVENT MARKERS
========================================= */

route.forEach((point)=>{

if(point.event){

let color = "yellow";

if(point.event === "Overspeed"){
color = "red";
}

if(point.event === "Harsh Brake"){
color = "orange";
}

L.circleMarker(point.latlng,{
radius:10,
color:color,
fillColor:color,
fillOpacity:1
})
.bindPopup(`
<b>${point.event}</b><br>
Time : ${point.time}
`)
.addTo(map);

}

});

/* =========================================
   VEHICLE ICON
========================================= */

const truckIcon = L.icon({

iconUrl:
'https://cdn-icons-png.flaticon.com/512/744/744465.png',

iconSize:[52,52],

iconAnchor:[26,26]

});

/* =========================================
   TRUCK MARKER
========================================= */

const truck = L.marker(route[0].latlng,{
icon:truckIcon
}).addTo(map);

/* =========================================
   MOVING POPUP
========================================= */

const vehiclePopup = L.popup({
closeButton:false,
autoClose:false,
closeOnClick:false,
className:'premiumPopup'
})
.setLatLng(route[0].latlng)
.setContent(`
<div style="
min-width:180px;
font-family:Arial;
">

<h3 style="
margin:0;
font-size:18px;
">
JH05AB1234
</h3>

<p style="
margin:8px 0;
color:green;
font-weight:bold;
">
● Moving
</p>

<p id="popupSpeed">
20 KM/H
</p>

<p>
Fuel : 72%
</p>

<p>
Driver : Active
</p>

</div>
`)
.openOn(map);

/* =========================================
   PLAYBACK VARIABLES
========================================= */

let currentSegment = 0;

let animationProgress = 0;

let running = false;

let playbackSpeed = 1;

let animationFrame;

/* =========================================
   INTERPOLATION
========================================= */

function interpolate(start,end,t){

return [

start[0] + (end[0]-start[0]) * t,

start[1] + (end[1]-start[1]) * t

];

}

/* =========================================
   PLAYBACK ENGINE
========================================= */

function animateTruck(){

if(!running) return;

const start = route[currentSegment];

const end = route[currentSegment+1];

if(!end){

running = false;

return;

}

/* SPEED */

animationProgress += 0.004 * playbackSpeed;

if(animationProgress >= 1){

animationProgress = 0;

currentSegment++;

}

/* POSITION */

const pos = interpolate(
start.latlng,
end.latlng,
animationProgress
);

/* MOVE VEHICLE */

truck.setLatLng(pos);

/* MOVE POPUP */

vehiclePopup.setLatLng(pos);

/* FOLLOW VEHICLE */

map.panTo(pos,{
animate:true,
duration:0.4
});

/* ROTATION FIX */

const icon = truck.getElement();

if(icon){

const angle = Math.atan2(
end.latlng[1]-start.latlng[1],
end.latlng[0]-start.latlng[0]
) * 180 / Math.PI;

icon.style.transformOrigin =
"center center";

icon.style.transition =
"transform 0.2s linear";

const existingTransform =
icon.style.transform.replace(
/rotate\\([^)]*\\)/g,
''
);

icon.style.transform =
`${existingTransform}
rotate(${angle}deg)`;

}

/* UPDATE SPEED */

const speed = end.speed;

document.getElementById('speedText')
.innerHTML =
speed + ' KM/H';

document.getElementById('speedMeter')
.innerHTML =
speed;

/* UPDATE POPUP SPEED */

const popupSpeed =
document.getElementById('popupSpeed');

if(popupSpeed){

popupSpeed.innerHTML =
speed + ' KM/H';

}

/* TIMELINE */

const timeline =
((currentSegment + animationProgress)
/(route.length-1))*100;

document.getElementById('timeline')
.value = timeline;

/* NEXT FRAME */

animationFrame =
requestAnimationFrame(animateTruck);

}

/* =========================================
   PLAY BUTTON
========================================= */

document.getElementById('playBtn')
.addEventListener('click',()=>{

if(running) return;

running = true;

animateTruck();

});

/* =========================================
   PAUSE BUTTON
========================================= */

document.getElementById('pauseBtn')
.addEventListener('click',()=>{

running = false;

cancelAnimationFrame(animationFrame);

});

/* =========================================
   REWIND BUTTON
========================================= */

document.getElementById('rewindBtn')
.addEventListener('click',()=>{

running = false;

cancelAnimationFrame(animationFrame);

currentSegment = 0;

animationProgress = 0;

truck.setLatLng(route[0].latlng);

vehiclePopup.setLatLng(route[0].latlng);

document.getElementById('timeline')
.value = 0;

});

/* =========================================
   SPEED CONTROL
========================================= */

document.getElementById('speedSelect')
.addEventListener('change',(e)=>{

playbackSpeed =
Number(e.target.value);

});

/* =========================================
   AUTO FIT ROUTE
========================================= */

map.fitBounds(
L.latLngBounds(
route.map(p=>p.latlng)
),
{
padding:[50,50]
}
);

</script>
