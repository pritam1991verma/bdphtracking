<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BDPH Premium Playback</title>

<!-- LEAFLET CSS -->

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- YOUR CSS -->

<link rel="stylesheet"
href="track-history.css">

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="leftHeader">

<h1>
BDPH Track Playback
</h1>

</div>

<div class="controls">

<button id="rewindBtn">
⏮ Rewind
</button>

<button id="playBtn">
▶ Play
</button>

<button id="pauseBtn">
⏸ Pause
</button>

<select id="speedSelect">

<option value="1">
1X
</option>

<option value="2">
2X
</option>

<option value="5">
5X
</option>

<option value="10">
10X
</option>

</select>

</div>

</div>

<!-- MAIN -->

<div class="mainContainer">

<!-- SIDEBAR -->

<div class="sidebar">

<!-- TRIP SUMMARY -->

<div class="card">

<h2>
Trip Summary
</h2>

<div class="statRow">
<span>Total Distance</span>
<b>377 KM</b>
</div>

<div class="statRow">
<span>Running Time</span>
<b>9.5 H</b>
</div>

<div class="statRow">
<span>Idle Time</span>
<b>1.2 H</b>
</div>

<div class="statRow">
<span>Average Speed</span>
<b id="speedText">
42 KM/H
</b>
</div>

<div class="statRow">
<span>Top Speed</span>
<b>85 KM/H</b>
</div>

</div>

<!-- EVENTS -->

<div class="card">

<h2>
Playback Events
</h2>

<div class="alertItem red">
Overspeed Detected
</div>

<div class="alertItem orange">
Harsh Braking
</div>

<div class="alertItem cyan">
Vehicle Halt
</div>

</div>

<!-- DRIVER SCORE -->

<div class="card scoreCard">

<h2>
Driver Score
</h2>

<div class="scoreCircle">
92
</div>

</div>

</div>

<!-- MAP AREA -->

<div class="mapContainer">

<!-- MAP -->

<div id="map"></div>

<!-- SPEEDOMETER -->

<div class="speedometer">

<span id="speedMeter">
42
</span>

<span>
KM/H
</span>

</div>

<!-- PLAYBACK PANEL -->

<div class="playbackPanel">

<input type="range"
id="timelineSlider"
min="0"
max="100"
value="0">

<!-- EVENT GRAPH -->

<div id="eventGraph">

<div class="graphLine"></div>

<div class="eventSpike red"
style="left:55%">
</div>

<div class="eventSpike orange"
style="left:72%">
</div>

<div class="eventSpike yellow"
style="left:88%">
</div>

<div id="playhead"></div>

</div>

<!-- TIMELINE -->

<div class="timelineInfo">

<span>
Trip Start
</span>

<span id="currentTime">
08:00:00
</span>

<span>
Trip End
</span>

</div>

</div>

</div>

</div>

<!-- LEAFLET JS -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- YOUR JS -->

<script src="track-history.js"></script>

</body>
</html>
