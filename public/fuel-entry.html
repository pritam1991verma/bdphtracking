<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>AI Fuel Entry</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#07111F] text-white min-h-screen">

  <div class="flex">

    <!-- SIDEBAR -->

    <div class="w-72 bg-[#0B1728] min-h-screen p-6 hidden lg:block border-r border-cyan-500/10">

      <h1 class="text-4xl font-bold text-cyan-400 mb-10">
        FuelAI
      </h1>

      <div class="space-y-4">

        <a
          href="fuel-management.html"
          class="block bg-[#122033] hover:bg-cyan-500/20 transition-all duration-300 p-4 rounded-2xl"
        >
          Dashboard
        </a>

        <a
          href="fuel-entry.html"
          class="block bg-cyan-500/20 p-4 rounded-2xl"
        >
          Fuel Entry
        </a>

        <div class="bg-[#122033] p-4 rounded-2xl">
          Vehicles
        </div>

        <div class="bg-[#122033] p-4 rounded-2xl">
          Drivers
        </div>

        <div class="bg-[#122033] p-4 rounded-2xl">
          AI Alerts
        </div>

        <div class="bg-[#122033] p-4 rounded-2xl">
          Analytics
        </div>

        <div class="bg-[#122033] p-4 rounded-2xl">
          Reports
        </div>

      </div>

    </div>

    <!-- MAIN CONTENT -->

    <div class="flex-1 p-6 lg:p-10">

      <!-- TOPBAR -->

      <div class="flex flex-col lg:flex-row justify-between lg:items-center gap-6 mb-10">

        <div>

          <h1 class="text-5xl font-bold text-cyan-400">
            Smart Fuel Entry
          </h1>

          <p class="text-gray-400 mt-3 text-lg">
            AI Powered Manual Fuel Intelligence System
          </p>

        </div>

        <div class="bg-cyan-500/10 border border-cyan-500/20 px-6 py-4 rounded-2xl">

          AI Monitoring Active

        </div>

      </div>

      <!-- ENTRY FORM -->

      <div class="bg-[#0F1C2E] rounded-3xl p-8 lg:p-10 border border-cyan-500/10 shadow-2xl">

        <h2 class="text-3xl font-bold mb-8">
          Fuel Entry Form
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <!-- VEHICLE -->

          <div>

            <label class="block mb-3 text-gray-400">
              Vehicle Number
            </label>

            <input
              id="vehicle"
              type="text"
              placeholder="BR01AB1234"
              class="w-full bg-[#122033] p-4 rounded-2xl outline-none border border-transparent focus:border-cyan-400"
            />

          </div>

          <!-- DRIVER -->

          <div>

            <label class="block mb-3 text-gray-400">
              Driver Name
            </label>

            <input
              id="driver"
              type="text"
              placeholder="Driver Name"
              class="w-full bg-[#122033] p-4 rounded-2xl outline-none border border-transparent focus:border-cyan-400"
            />

          </div>

          <!-- FUEL -->

          <div>

            <label class="block mb-3 text-gray-400">
              Fuel Quantity (Liters)
            </label>

            <input
              id="fuel"
              type="number"
              placeholder="120"
              class="w-full bg-[#122033] p-4 rounded-2xl outline-none border border-transparent focus:border-cyan-400"
            />

          </div>

          <!-- ODOMETER -->

          <div>

            <label class="block mb-3 text-gray-400">
              Odometer Reading
            </label>

            <input
              id="odometer"
              type="number"
              placeholder="125600"
              class="w-full bg-[#122033] p-4 rounded-2xl outline-none border border-transparent focus:border-cyan-400"
            />

          </div>

          <!-- ENGINE HOURS -->

          <div>

            <label class="block mb-3 text-gray-400">
              Engine Hours
            </label>

            <input
              id="engineHours"
              type="number"
              placeholder="12"
              class="w-full bg-[#122033] p-4 rounded-2xl outline-none border border-transparent focus:border-cyan-400"
            />

          </div>

          <!-- FUEL STATION -->

          <div>

            <label class="block mb-3 text-gray-400">
              Fuel Station
            </label>

            <input
              id="station"
              type="text"
              placeholder="Fuel Station"
              class="w-full bg-[#122033] p-4 rounded-2xl outline-none border border-transparent focus:border-cyan-400"
            />

          </div>

        </div>

        <!-- BUTTON -->

        <button
          onclick="submitFuel()"
          class="mt-10 bg-cyan-500 hover:bg-cyan-400 text-black font-bold px-10 py-4 rounded-2xl transition-all duration-300"
        >

          Submit Fuel Entry

        </button>

      </div>

      <!-- AI RESULT -->

      <div
        id="aiResult"
        class="hidden mt-10 bg-[#0F1C2E] rounded-3xl p-8 border border-cyan-500/10"
      ></div>

      <!-- RECENT ENTRIES -->

      <div class="mt-10 bg-[#0F1C2E] rounded-3xl p-8 border border-cyan-500/10">

        <div class="flex justify-between items-center mb-8">

          <h2 class="text-3xl font-bold">
            Recent Fuel Entries
          </h2>

          <div class="text-cyan-400">
            Live Local Storage Data
          </div>

        </div>

        <div class="overflow-auto">

          <table class="w-full min-w-[800px]">

            <thead>

              <tr class="border-b border-cyan-500/10 text-cyan-400">

                <th class="text-left p-4">Vehicle</th>
                <th class="text-left p-4">Driver</th>
                <th class="text-left p-4">Fuel</th>
                <th class="text-left p-4">Mileage</th>
                <th class="text-left p-4">Risk</th>
                <th class="text-left p-4">Time</th>

              </tr>

            </thead>

            <tbody id="recentEntries">

            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

  <script src="fuel-entry.js"></script>

</body>

</html>
