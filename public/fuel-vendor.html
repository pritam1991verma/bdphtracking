<a href="driver-ai.html" class="menu-item">

    <div class="topbar">

      <div>

        <h2>Fuel Vendor Management</h2>

        <p>
          Pump & Fuel Vendor Intelligence
        </p>

      </div>

    </div>

    <!-- FORM -->

    <div class="form-container">

      <h3>Add Fuel Vendor</h3>

      <div class="form-grid">

        <input id="vendorName"
               placeholder="Vendor Name">

        <input id="location"
               placeholder="Location">

        <input id="fuelRate"
               placeholder="Fuel Rate">

        <input id="contact"
               placeholder="Contact Number">

      </div>

      <button onclick="saveVendor()">
        Save Vendor
      </button>

    </div>

    <!-- TABLE -->

    <div class="table-container">

      <h3>Fuel Vendor List</h3>

      <table>

        <thead>

          <tr>

            <th>Vendor</th>
            <th>Location</th>
            <th>Fuel Rate</th>
            <th>Contact</th>

          </tr>

        </thead>

        <tbody id="vendorTable">

        </tbody>

      </table>
