<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BDPH AdBlue</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <div id="topbarMount"></div>

      <section class="page-hero compact-hero">
        <div>
          <span class="hero-kicker">AdBlue</span>
          <h2>AdBlue monitoring with a focused service-ready view.</h2>
          <p class="small">Review low AdBlue vehicles and keep emission support ready across the fleet.</p>
        </div>
      </section>

      <section class="section-grid two-col">
        <article class="panel section-card">
          <h3>AdBlue Metrics</h3>
          <div class="metric-stack" id="adblueMetrics"></div>
        </article>
        <article class="panel section-card">
          <h3>AdBlue Priority List</h3>
          <div class="table-stack" id="adblueList"></div>
        </article>
      </section>
    </div>

    <script src="/common.js"></script>
    <script src="/adblue.js"></script>
  </body>
</html>
