<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Driver Master</title>

  <link rel="stylesheet"
        href="driver-master.css">

</head>

<body>

<div class="main-container">

  <!-- SIDEBAR -->

  <div class="sidebar">

    <h1 class="logo">FuelAI</h1>

    <div class="menu">

      <a href="fuel-management.html" class="menu-item">
        Dashboard
      </a>

      <a href="fuel-entry.html" class="menu-item">
        Fuel Entry
      </a>

      <a href="vehicle-master.html" class="menu-item">
        Vehicles
      </a>

      <a href="driver-master.html"
         class="menu-item active">
        Drivers
      </a>

      <a href="#" class="menu-item">
        AI Alerts
      </a>

      <a href="#" class="menu-item">
        Analytics
      </a>

      <a href="#" class="menu-item">
        Reports
      </a>

    </div>

  </div>

  <!-- CONTENT -->

  <div class="content">

    <div class="topbar">

      <div>

        <h2>Driver Master</h2>

        <p>
          Driver Intelligence Management
        </p>

      </div>

    </div>

    <!-- FORM -->

    <div class="form-container">

      <h3>Add Driver</h3>

      <div class="form-grid">

        <input id="driverName"
               placeholder="Driver Name">

        <input id="mobile"
               placeholder="Mobile Number">

        <input id="license"
               placeholder="License Number">

        <input id="assignedVehicle"
               placeholder="Assigned Vehicle">

      </div>

      <button onclick="saveDriver()">
        Save Driver
      </button>

    </div>

    <!-- TABLE -->

    <div class="table-container">

      <h3>Registered Drivers</h3>

      <table>

        <thead>

          <tr>

            <th>Name</th>
            <th>Mobile</th>
            <th>License</th>
            <th>Vehicle</th>

          </tr>

        </thead>

        <tbody id="driverData">

        </tbody>

      </table>

    </div>

  </div>

</div>

<script src="driver-master.js"></script>

</body>

</html>
